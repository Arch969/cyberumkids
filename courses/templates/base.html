{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>КиберУм — Учимся играя</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/styles.css" />

  {% block extra_head %}{% endblock %}
</head>
<body class="light-bg">
  <!-- Наклейки-следы за курсором -->
  <div id="cursor-play"></div>

<header class="site-header bright">
  <a href="/courses/" class="logo">🧠 КиберУм</a>
  <nav>
    <a href="/calendar/">Расписание</a>
    <a href="/courses/">Курсы</a>
    <a href="/cabinet/">Кабинет</a>

<!-- Бейдж с Braincoin -->
<span id="stars-badge" class="stars-badge">
  <img src="{% static 'img/braincoin.png' %}" alt="Braincoin" class="coin-icon"
       style="width:20px;height:20px;object-fit:contain;">
  <span id="stars-count" class="stars-count">--</span>
</span>

    <a href="/logout/" class="logout">Выйти</a>
  </nav>
</header>


  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">© КиберУм — учимся играя</footer>

  <script src="/static/js/app.js"></script>
{% block extra_js %}{% endblock %}
{% block extra_scripts %}{% endblock %}
</body>
</html>
