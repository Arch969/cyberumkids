<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход — КиберУм</title>
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>
<body class="auth-body bright-gradient">
  <div class="auth-card light">
    <div class="auth-hero">
      <h1>Привет в <span>КиберУме</span>! 🎈</h1>
      <p>Собери свой первый проект уже сегодня</p>
    </div>
    <form method="post" class="auth-form">
      {% csrf_token %}
      {% if error %}<div class="error">{{ error }}</div>{% endif %}
      <label>Логин</label>
      <input type="text" name="login" placeholder="admin" required>
      <label>Пароль</label>
      <input type="password" name="password" placeholder="admin" required>
      <button type="submit" class="btn-primary bouncy">Войти</button>
    </form>
  </div>
</body>
</html>
